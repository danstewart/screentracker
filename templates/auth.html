<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>ScreenTracker</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap"
			rel="stylesheet"
		/>
		<link
			rel="icon"
			href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎥</text></svg>"
		/>
		<style>
			:root {
				--bg: #0d0d0d;
				--surface: #161616;
				--border: #2a2a2a;
				--accent: #e8c547;
				--text: #f0ede6;
				--muted: #888;
				--danger: #c44;
			}
			* { margin: 0; padding: 0; box-sizing: border-box; }
			body {
				background: var(--bg);
				color: var(--text);
				font-family: 'DM Sans', sans-serif;
				font-weight: 300;
				min-height: 100vh;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			.card {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 12px;
				padding: 48px 40px;
				width: 100%;
				max-width: 360px;
				text-align: center;
			}
			h1 {
				font-family: 'Bebas Neue', sans-serif;
				font-size: 36px;
				letter-spacing: 4px;
				margin-bottom: 4px;
			}
			h1 span { color: var(--accent); }
			.subtitle {
				color: var(--muted);
				font-size: 11px;
				letter-spacing: 3px;
				text-transform: uppercase;
				margin-bottom: 40px;
			}
			input[type="password"] {
				width: 100%;
				background: #0d0d0d;
				border: 1px solid var(--border);
				border-radius: 8px;
				color: var(--text);
				font-family: 'DM Sans', sans-serif;
				font-size: 20px;
				letter-spacing: 8px;
				text-align: center;
				padding: 14px 16px;
				outline: none;
				margin-bottom: 16px;
				transition: border-color 0.15s;
			}
			input[type="password"]:focus {
				border-color: var(--accent);
			}
			button {
				width: 100%;
				background: var(--accent);
				color: #0d0d0d;
				border: none;
				border-radius: 8px;
				font-family: 'DM Sans', sans-serif;
				font-size: 14px;
				font-weight: 600;
				letter-spacing: 2px;
				text-transform: uppercase;
				padding: 14px;
				cursor: pointer;
				transition: opacity 0.15s;
			}
			button:hover { opacity: 0.85; }
			.error {
				color: var(--danger);
				font-size: 13px;
				margin-bottom: 16px;
				margin-top: -8px;
			}
		</style>
	</head>
	<body>
		<div class="card">
			<h1>SCREEN<span>TRACKER</span></h1>
			<p class="subtitle">Enter PIN to continue</p>
			<form method="post">
				<input
					type="password"
					name="pin"
					inputmode="numeric"
					placeholder="••••"
					autocomplete="current-password"
					autofocus
				/>
				{% if error %}
				<p class="error">{{ error }}</p>
				{% endif %}
				<button type="submit">Unlock</button>
			</form>
		</div>
	</body>
</html>
